name: Build and Release APK

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build, Sign, and Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Get Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Sign APK with Temporary Keystore
        run: |
          mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/paolo_exercise1-unsigned.apk

          # Generate a temporary keystore
          keytool -genkey -v -keystore temp.keystore -alias tempalias -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=Temp, OU=Temp, O=Temp, L=Temp, S=Temp, C=US"

          # Sign the APK using apksigner from the Android build tools
          # Find the highest build-tools version installed on the runner
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | tail -1)

          # Use apksigner
          $BUILD_TOOLS_DIR/apksigner sign --ks temp.keystore --ks-pass pass:password --ks-key-alias tempalias --out app/build/outputs/apk/release/paolo_exercise1.apk app/build/outputs/apk/release/paolo_exercise1-unsigned.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: paolo_exercise1
          path: app/build/outputs/apk/release/paolo_exercise1.apk

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.vars.outputs.sha_short }}
          name: Build ${{ steps.vars.outputs.sha_short }}
          files: app/build/outputs/apk/release/paolo_exercise1.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
